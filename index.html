<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALTERWEB YOUTUBE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="logo">ALTERWEB <span>YOUTUBE</span></h1>
        
        <div class="search-box">
            <input type="text" id="youtube-url" placeholder="Paste YouTube Video Link Here...">
            <button onclick="checkStatus()" class="btn-check">CHECK STATUS</button>
        </div>

        <div id="video-section" class="hidden">
            <div class="video-wrapper">
                <iframe id="yt-player" width="100%" height="350" src="" frameborder="0" allowfullscreen></iframe>
            </div>
            
            <div class="video-info">
                <h3 id="video-title">Loading Title...</h3>
                <p id="video-link-text"></p>
            </div>

            <div class="activation-box">
                <div class="buy-section">
                    <span class="price"><del>₹150</del> <strong>₹50</strong></span>
                    <a href="https://wa.me/91YOURNUMBERHERE?text=I%20want%20to%20buy%20Alterweb%20YouTube%20Key" target="_blank" class="btn-buy">BUY</a>
                </div>
                
                <div class="key-submit-section">
                    <input type="text" id="activation-key" placeholder="Enter Activation Key">
                    <button onclick="applyKey()" class="btn-submit">Submit</button>
                </div>
                
                <p id="status-message"></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
